name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check api/*.js api/cron/*.js lib/*.js public/js/*.js

      - name: Verify package.json is valid
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: Verify JSON configs are valid
        run: |
          for f in agents/*.json config/*.json; do
            echo "Checking $f..."
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8'))"
          done

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify all imports resolve
        run: |
          for f in lib/*.js; do
            echo "Checking $f..."
            node -e "require('./$f')" 2>&1 || true
          done
